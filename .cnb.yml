# 仅手动触发: Web UI 按钮 → 输入版本号 → 构建

"**":
  web_trigger_build:
    - runner: {tags: "cnb:arch:amd64"}
      services: [docker]
      stages:
        - name: multi-platform build
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            TAG="${VERSION:-latest}"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${IMAGE}:${TAG}" \
              --tag "${IMAGE}:latest" \
              --push \
              .
