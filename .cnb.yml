# 矩阵构建: AMD64 + ARM64 分别构建，合并为多架构镜像
# 触发方式: 手动触发 (Web UI)，输入版本号
# 产物: :latest + :v版本号 两个多架构标签

"**":
  web_trigger_build:
    # AMD64架构的构建任务
    - runner:
        tags: cnb:arch:amd64
      services:
        - docker
      env:
        IMAGE_VER: ${VERSION:-latest}
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION:-latest}-linux-amd64
        IMAGE_LATEST: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest-linux-amd64
      stages:
        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: docker build (AMD64)
          script: |
            docker buildx build --platform linux/amd64 --provenance=false \
              --tag ${IMAGE_TAG} --tag ${IMAGE_LATEST} .
        - name: docker push
          script: docker push ${IMAGE_TAG} && docker push ${IMAGE_LATEST}
        - name: resolve
          type: cnb:resolve
          options:
            key: build-amd64
    
    # ARM64架构的构建任务
    - runner:
        tags: cnb:arch:arm64:v8
      services:
        - docker
      env:
        IMAGE_VER: ${VERSION:-latest}
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:${VERSION:-latest}-linux-arm64
        IMAGE_LATEST: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest-linux-arm64
      stages:
        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: docker build (ARM64)
          script: |
            docker buildx build --platform linux/arm64 --provenance=false \
              --tag ${IMAGE_TAG} --tag ${IMAGE_LATEST} .
        - name: docker push
          script: docker push ${IMAGE_TAG} && docker push ${IMAGE_LATEST}
        - name: resolve
          type: cnb:resolve
          options:
            key: build-arm64

    # 创建多架构 latest 镜像
    - services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
        IMAGE_VER: ${VERSION:-latest}
        REGISTRY: ${CNB_DOCKER_REGISTRY}
        REPO: ${CNB_REPO_SLUG_LOWERCASE}
      stages:
        - name: await the amd64
          type: cnb:await
          options:
            key: build-amd64
        - name: await the arm64
          type: cnb:await
          options:
            key: build-arm64
        - name: manifest (latest)
          image: plugins/manifest
          settings:
            username: $CNB_TOKEN_USER_NAME
            password: $CNB_TOKEN
            target: ${IMAGE_TAG}
            template: ${IMAGE_TAG}-OS-ARCH
            platforms:
              - linux/amd64
              - linux/arm64
        - name: manifest (version)
          image: plugins/manifest
          settings:
            username: $CNB_TOKEN_USER_NAME
            password: $CNB_TOKEN
            target: ${REGISTRY}/${REPO}:${IMAGE_VER}
            template: ${REGISTRY}/${REPO}:${IMAGE_VER}-OS-ARCH
            platforms:
              - linux/amd64
              - linux/arm64
        - name: cleanup intermediate tags
          script: |
            for TAG in latest-linux-amd64 latest-linux-arm64 ${IMAGE_VER}-linux-amd64 ${IMAGE_VER}-linux-arm64; do
              DIGEST=$(curl -s -u "${CNB_TOKEN_USER_NAME}:${CNB_TOKEN}" \
                -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                "https://${REGISTRY}/v2/${REPO}/manifests/${TAG}" \
                -o /dev/null -w "%header{docker-content-digest}" 2>/dev/null)
              [ -n "$DIGEST" ] && curl -s -u "${CNB_TOKEN_USER_NAME}:${CNB_TOKEN}" \
                -X DELETE "https://${REGISTRY}/v2/${REPO}/manifests/${DIGEST}" > /dev/null 2>&1
              echo "  cleaned: ${TAG}"
            done
