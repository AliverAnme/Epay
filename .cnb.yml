main:
  push:
    - services: [docker]
      stages:
        - name: multi-platform build
          runner: {tags: "cnb:arch:amd64"}
          script: |
            set -e
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            TAG="latest"

            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${IMAGE}:${TAG}" \
              --push \
              .
