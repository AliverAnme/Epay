main:
  push:
    - runner: {tags: "cnb:arch:amd64"}
      services: [docker]
      stages:
        - name: try buildx multi-platform
          script: |
            set -e
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${IMAGE}:latest" \
              --push \
              .
