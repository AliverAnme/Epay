# CNB 流水线
# 自动触发: main 分支 push → latest
# 手动触发: Web UI 按钮 "构建镜像" → 使用按钮预设的 VERSION
# CLI 手动: cnb:trigger --slug aliveranme/Epay --event web_trigger_build --env "VERSION=1.0.0"

button:
  - name: 构建 Docker 镜像
    description: 手动构建多平台镜像并推送到制品库
    event: web_trigger_build
    env:
      VERSION: latest

main:
  push:
    - runner: {tags: "cnb:arch:amd64"}
      services: [docker]
      stages:
        - name: multi-platform build
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${IMAGE}:latest" \
              --push \
              .

"**":
  web_trigger_build:
    - runner: {tags: "cnb:arch:amd64"}
      services: [docker]
      stages:
        - name: multi-platform build
          script: |
            IMAGE="${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}"
            TAG="${VERSION:-latest}"
            docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${IMAGE}:${TAG}" \
              --tag "${IMAGE}:latest" \
              --push \
              .
