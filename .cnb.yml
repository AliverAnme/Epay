# 矩阵构建: AMD64 + ARM64 分别构建，合并为多架构镜像
# 触发方式: 手动触发 (Web UI)

"**":
  web_trigger_build:
    # AMD64架构的构建任务
    - runner:
        tags: cnb:arch:amd64  # 指定运行在AMD64架构的runner上
      services:
        - docker  # 使用Docker服务
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest-linux-amd64
      stages:
        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: docker build (AMD64)
          script: docker build --platform linux/amd64 -t ${IMAGE_TAG} .
        - name: docker push
          script: docker push ${IMAGE_TAG}
        - name: resolve
          type: cnb:resolve
          options:
            key: build-amd64  # 标记AMD64构建完成
    
    # ARM64架构的构建任务
    - runner:
        tags: cnb:arch:arm64:v8  # 指定运行在ARM64架构的runner上
      services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest-linux-arm64
      stages:
        - name: docker login
          script: docker login -u ${CNB_TOKEN_USER_NAME} -p "${CNB_TOKEN}" ${CNB_DOCKER_REGISTRY}
        - name: docker build (ARM64)
          script: docker build --platform linux/arm64 -t ${IMAGE_TAG} .
        - name: docker push
          script: docker push ${IMAGE_TAG}
        - name: resolve
          type: cnb:resolve
          options:
            key: build-arm64  # 标记ARM64构建完成

    # 创建多架构镜像
    - services:
        - docker
      env:
        IMAGE_TAG: ${CNB_DOCKER_REGISTRY}/${CNB_REPO_SLUG_LOWERCASE}:latest
      stages:
        - name: await the amd64
          type: cnb:await
          options:
            key: build-amd64  # 等待AMD64构建完成
        - name: await the arm64
          type: cnb:await
          options:
            key: build-arm64  # 等待ARM64构建完成
        - name: manifest
          image: plugins/manifest  # 使用manifest插件创建多架构镜像
          settings:
            username: $CNB_TOKEN_USER_NAME
            password: $CNB_TOKEN
            target: ${IMAGE_TAG}  # 目标镜像标签
            template: ${IMAGE_TAG}-OS-ARCH  # 模板格式
            platforms:  # 支持的平台
              - linux/amd64
              - linux/arm64
