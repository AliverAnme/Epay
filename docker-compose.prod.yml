version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: epay-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_data:/var/www/html:ro
    depends_on:
      php:
        condition: service_started
    networks:
      - epay-network

  php:
    image: ghcr.io/aliveranme/epay:latest
    container_name: epay-php
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-epay}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-epay}
      DB_PREFIX: ${DB_PREFIX:-pay}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL:-http://localhost}
    volumes:
      - app_data:/var/www/html
      - ./plugins:/var/www/html/plugins
      - uploads:/var/www/html/assets/uploads
      - sessions:/var/lib/php/sessions
    networks:
      - epay-network

  mysql:
    image: mysql:8.0
    container_name: epay-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-epay}
      MYSQL_USER: ${DB_USER:-epay}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=
      - --default-time-zone=+08:00
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - epay-network

  cron:
    image: alpine:latest
    container_name: epay-cron
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_started
    environment:
      CRON_KEY: ${CRON_KEY}
      SITE_URL: ${SITE_URL:-http://nginx}
    entrypoint: |
      /bin/sh -c '
      apk add --no-cache curl tzdata;
      ln -snf /usr/share/zoneinfo/Asia/Shanghai /etc/localtime;
      echo "*/5 * * * * curl -s -o /dev/null -w \"%{http_code}\" $${SITE_URL}/cron.php?key=$${CRON_KEY}" > /etc/crontabs/root;
      crond -f -l 2
      '
    networks:
      - epay-network

volumes:
  app_data:
  uploads:
  sessions:
  mysql_data:

networks:
  epay-network:
    driver: bridge
